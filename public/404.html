<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting…</title>
  <script>
    // SPA redirect: preserve path, query, and hash after the repo base.
    // Must stay in sync with the `base` value in vite.config.js.
    var base = '/SAIFALDEENSAADALKADHIM.github.io/';
    var l = window.location;
    // Only strip the base prefix when the current pathname actually starts with it.
    var rest = l.pathname.startsWith(base) ? l.pathname.slice(base.length) : '';
    var path = rest + l.search + l.hash;
    var dest = base + (path ? '?p=' + encodeURIComponent(path) : '');
    l.replace(dest);
  </script>
  <link rel="canonical" href="/SAIFALDEENSAADALKADHIM.github.io/">
  <noscript>
    <meta http-equiv="refresh" content="0; url=/SAIFALDEENSAADALKADHIM.github.io/">
  </noscript>
</head>
<body></body>
</html>
