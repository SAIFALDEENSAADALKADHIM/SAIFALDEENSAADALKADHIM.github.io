<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting…</title>
  <script>
    // SPA redirect: preserve path, query, and hash for GitHub Pages user site.
    var l = window.location;
    var dest = '/' + (l.search ? '?p=' + encodeURIComponent(l.pathname.slice(1) + l.search + l.hash) : '');
    l.replace(dest);
  </script>
  <link rel="canonical" href="/">
  <noscript>
    <meta http-equiv="refresh" content="0; url=/">
  </noscript>
</head>
<body></body>
</html>
